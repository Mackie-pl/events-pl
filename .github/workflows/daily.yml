name: daily-events
on:
  schedule:
    - cron: "0 4 * * *" # codziennie 6:00 czasu PL (lato)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --omit=optional
      - run: npm run daily
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # opcjonalna ewaluacja modeli:
          # MODEL_EXTRACT: anthropic/claude-haiku-4.5
      - name: Commit results
        run: |
          git config user.name "events-bot"
          git config user.email "bot@users.noreply.github.com"
          git add events.json index.html state.json
          git diff --cached --quiet || git commit -m "daily $(date +%F)"
          git push
