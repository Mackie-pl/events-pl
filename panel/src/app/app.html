<tui-root>
  <div class="shell">
    <header class="topbar">
      <a routerLink="/" class="brand">
        <tui-icon icon="@tui.activity" />
        <strong>events-pl</strong>
        <span class="muted">observability</span>
      </a>
      <span class="spacer"></span>
      @if (data.sources.value(); as s) {
        <span class="muted region">{{ s.region.name }} · {{ s.sources.length }} sources</span>
      }
      <a
        tuiButton
        appearance="secondary"
        size="s"
        href="https://github.com/Mackie-pl/events-pl"
        target="_blank"
        rel="noopener"
      >
        GitHub
      </a>
      <button
        tuiButton
        appearance="primary"
        size="s"
        [disabled]="data.loading()"
        (click)="data.reloadAll()"
      >
        Refresh
      </button>
    </header>
    <main class="content">
      <router-outlet />
    </main>
  </div>
</tui-root>
