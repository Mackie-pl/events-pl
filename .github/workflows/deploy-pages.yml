# Publishes GitHub Pages: events frontend (index.html + data JSONs) at the root
# and the observability panel (Angular) under /panel/.
#
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".
# Triggered by every push to main — including the daily bot commit, which keeps
# the deployed data fresh (the panel also reads raw.githubusercontent.com at runtime).
name: deploy-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: panel/package-lock.json
      - name: Build panel
        working-directory: panel
        run: |
          npm ci --no-audit --no-fund
          npm run build -- --base-href /events-pl/panel/
      - name: Assemble site
        run: |
          mkdir -p _site/panel
          cp index.html events.json runs.json sources.json state.json _site/ 2>/dev/null || true
          cp -r panel/dist/panel/browser/. _site/panel/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4
        id: deployment
