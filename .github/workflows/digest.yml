name: daily-digest
on:
  schedule:
    - cron: "0 15 * * *" # 17:00 czasu PL latem (CEST); zimą 16:00 — ew. zmienić na 16
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --omit=optional
      - run: npm run digest
        env:
          # Telegram (aktywny kanał):
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Email — odkomentuj, gdy zechcesz używać:
          # RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # DIGEST_TO: ${{ secrets.DIGEST_TO }}
          # opcjonalnie:
          # DIGEST_CHILD_AGE: "5"
