const EVENTS = Array.isArray(DATA) ? DATA : (DATA.events||[]);
const state={q:"",age:null,weekend:false,family:false,free:false};
const dni=["nd","pon","wt","śr","czw","pt","sob"];
function nextWeekend(){const t=new Date();const sat=new Date(t);sat.setDate(t.getDate()+((6-t.getDay())%7));const sun=new Date(sat);sun.setDate(sat.getDate()+1);const f=d=>d.toISOString().slice(0,10);return[f(sat),f(sun)];}
const WK=nextWeekend();
const fmt=iso=>{const d=new Date(iso+"T12:00:00");return dni[d.getDay()]+" "+d.getDate()+"."+String(d.getMonth()+1).padStart(2,"0")};
const inWk=e=>WK.includes(e.date_start)||(e.date_end&&e.date_start<=WK[1]&&e.date_end>=WK[0]);
function ageOk(e,w){if(w==null||isNaN(w))return true;const a=e.age||{};if(a.min!=null&&w<a.min)return false;if(a.max!=null&&w>a.max)return false;return true;}
function matches(e){
  if(e.is_noise)return false;
  if(e.date_end?e.date_end<new Date().toISOString().slice(0,10):e.date_start<new Date().toISOString().slice(0,10))return false;
  if(state.weekend&&!inWk(e))return false;
  if(state.family&&e.family_friendly!==true)return false;
  if(state.free&&!(e.price&&e.price.free===true))return false;
  if(!ageOk(e,state.age))return false;
  if(state.q){const h=((e.title||"")+" "+(e.venue||"")+" "+(e.tags||[]).join(" ")+" "+(e.town||"")).toLowerCase();if(!h.includes(state.q.toLowerCase()))return false;}
  return true;
}
function render(){
  const evs=EVENTS.filter(matches).sort((a,b)=>(a.date_start||"").localeCompare(b.date_start||"")||(a.time_start||"").localeCompare(b.time_start||""));
  document.getElementById("list").innerHTML=evs.map(e=>{
    const a=e.age||{},p=e.price||{};
    return `<div class="card">
      <div class="when"><div class="d">${fmt(e.date_start)}${e.date_end?"<br>–"+fmt(e.date_end):""}</div><div class="t">${e.time_start||""}${e.time_end?"–"+e.time_end:""}</div></div>
      <div style="flex:1">
        <h3><a href="${e.source_url}" target="_blank" rel="noopener">${e.title}</a></h3>
        <div class="meta">📍 ${e.venue||"?"} · ${e.town||""}${e.geo?` · <a href="https://www.openstreetmap.org/?mlat=${e.geo.lat}&mlon=${e.geo.lon}#map=16/${e.geo.lat}/${e.geo.lon}" target="_blank">mapa</a>`:""}${e.registration?` · zapisy: ${e.registration}`:""}</div>
        ${e.container?`<div class="meta">↳ część: ${e.container}</div>`:""}
        ${e.conditional?`<div class="note">⚠️ ${e.conditional}</div>`:""}
        ${e.sub_slots?`<div class="slots">${e.sub_slots.map(s=>`⏱ ${s.time} — ${s.label}${s.age&&s.age.label?" ("+s.age.label+")":""}`).join("<br>")}</div>`:""}
        <div class="tags">
          ${a.label?`<span class="tag age">wiek: ${a.label}</span>`:""}
          ${e.family_friendly===true?'<span class="tag family">👨‍👦 dla dzieci</span>':(e.family_friendly==="maybe"?'<span class="tag">rodzinnie? 🤔</span>':"")}
          ${p.free===true?'<span class="tag free">bezpłatne</span>':(p.free===false?`<span class="tag paid">${p.amount_pln?p.amount_pln+" zł":"płatne"}</span>`:"")}
          ${(e.tags||[]).map(t=>`<span class="tag" onclick="setQ('${t}')">${t}</span>`).join("")}
        </div>
      </div></div>`}).join("");
  document.getElementById("empty").style.display=evs.length?"none":"block";
  document.getElementById("count").textContent=evs.length+" wydarzeń";
}
function setQ(t){state.q=t;document.getElementById("q").value=t;render();}
document.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{state[c.dataset.f]=!state[c.dataset.f];c.classList.toggle("on");render();}));
document.getElementById("q").addEventListener("input",e=>{state.q=e.target.value;render();});
document.getElementById("age").addEventListener("input",e=>{state.age=e.target.value===""?null:parseInt(e.target.value,10);render();});
document.getElementById("gen").textContent="Wygenerowano automatycznie"+(DATA.generated?" · "+DATA.generated:"")+" · kliknij tag, by filtrować (np. warsztaty:ceramika)";
render();
